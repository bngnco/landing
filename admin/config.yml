# ════════════════════════════════════════════════════════════════════
#  Verifyco Blog — Sveltia CMS configuration
#  Admin panel lives at /admin. Posts are committed to the git repo as
#  Markdown in /content/blog, then Vercel rebuilds the static blog.
# ════════════════════════════════════════════════════════════════════

backend:
  name: github
  repo: bngnco/landing
  branch: main            # the branch Vercel deploys to production
  # NOTE: no OAuth proxy/server is required. Sign in with a GitHub
  # Personal Access Token ("Sign In Using Access Token") — see README-BLOG.md.
  # OPTIONAL one-click "Sign In with GitHub" needs a free Cloudflare auth
  # worker; if you set one up, uncomment and point base_url at it:
  # base_url: https://your-auth-worker.workers.dev

# Lets you run the admin on your own machine with NO login:
#   1) terminal A:  npx decap-server        (local git proxy on :8081)
#   2) terminal B:  npx serve .             (static server at the repo root)
#   3) open  http://localhost:3000/admin/   (saves write straight to your files)
local_backend: true

# Where the CMS stores uploaded images.
media_folder: "uploads/blog"
public_folder: "/uploads/blog"

# Show a "View live" link from the editor.
site_url: https://verifyco.info
display_url: https://verifyco.info/blog

# ── Internationalisation ─────────────────────────────────────────────
# One entry, edited in every language side by side, is written as separate
# Markdown files the build understands:
#   English (default) → content/blog/<slug>.md
#   Turkish           → content/blog/<slug>.tr.md
# Add a language by appending its code here AND to LANGS in
# scripts/build-blog.mjs, then translate each post.
i18n:
  structure: multiple_files
  locales: [en, tr, es, de, fr, it, pt, ar]
  default_locale: en
  # Keep the default locale's filename clean (<slug>.md, not <slug>.en.md).
  omit_default_locale_from_file_path: true

collections:
  - name: blog
    label: "Blog posts"
    label_singular: "Post"
    description: "Articles published at verifyco.info/blog"
    folder: "content/blog"
    create: true
    extension: md
    format: frontmatter
    i18n: true
    slug: "{{slug}}"
    summary: "{{title}}  —  {{date}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "Drafts", field: draft, pattern: true }
    fields:
      - { name: title, label: "Title (H1 + SEO title)", widget: string, i18n: true }
      - {
          name: description,
          label: "Meta description / excerpt",
          widget: text,
          i18n: true,
          hint: "≈150–160 characters. Used for the <meta description>, social cards and the listing excerpt.",
        }
      - {
          name: slug,
          label: "Slug (shared across languages — the URL)",
          widget: string,
          i18n: duplicate,
          hint: "Lowercase, hyphenated. The same slug links a post's translations, e.g. what-is-a-deepfake.",
        }
      - {
          name: date,
          label: "Publish date",
          widget: datetime,
          i18n: duplicate,
          date_format: "YYYY-MM-DD",
          time_format: false,
          picker_utc: true,
        }
      - { name: author, label: "Author", widget: string, default: "Verifyco Team", i18n: true }
      - {
          name: tags,
          label: "Tags",
          widget: list,
          default: ["Guides"],
          i18n: true,
          hint: "Used for topic pages. Translate them per language (e.g. Guides → Rehberler).",
        }
      - {
          name: image,
          label: "Featured image",
          widget: image,
          required: false,
          i18n: duplicate,
          choose_url: true,
          hint: "Upload or pick an image — JPG/PNG/WebP up to a few MB works best (recommended 1200×630). iPhone HEIC photos may not process in the browser: convert to JPG first. Stored in /uploads/blog; leave blank for the default.",
        }
      - { name: imageAlt, label: "Featured image — alt text", widget: string, required: false, i18n: true }
      - {
          name: draft,
          label: "Draft (hide from the live site)",
          widget: boolean,
          default: false,
          i18n: duplicate,
        }
      - {
          name: body,
          label: "Body",
          widget: markdown,
          i18n: true,
          hint: "Write the article. Type [[cta]] on its own line to drop an inline App Store call-to-action.",
        }
